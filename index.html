<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armory — Navy & White</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script>
  // Wait for scripts to fully load before initializing
  function initFirebase() {
    const firebaseConfig = {
      apiKey: "AIzaSyDw95urlhjKkXqBcj4LNgkHpmWydFsHLR0",
      authDomain: "firearm-inventory-5d0be.firebaseapp.com",
      projectId: "firearm-inventory-5d0be",
      storageBucket: "firearm-inventory-5d0be.firebasestorage.app",
      messagingSenderId: "1060866359048",
      appId: "1:1060866359048:web:6373c8ba96e8236b9176bd"
    };

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      window.db = firebase.firestore();
      window.storage = firebase.storage();
      window._fbReady = true;
      document.dispatchEvent(new Event('firebase-ready'));
    } catch (e) {
      console.error("Firebase initialization failed:", e);
    }
  }

  // Set up a listener for real-time updates
  window._fbListen = (callback) => {
    if(!window.db) return;
    return window.db.collection("armory").doc("inventory").onSnapshot((doc) => {
      if(doc.exists) callback(doc.data().data || []);
    });
  };

  initFirebase();
</script>

<style>
  :root {
    --navy: #0a192f;
    --navy-light: #112240;
    --navy-lighter: #233554;
    --accent: #64ffda;
    --slate: #8892b0;
    --light-slate: #a8b2d1;
    --white: #e6f1ff;
    --glass: rgba(255, 255, 255, 0.05);
    --red: #ff4d4d;
    --green: #64ffda;
    --muted: #495670;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background-color: var(--navy); 
    color: var(--white); 
    font-family: 'Inter', -apple-system, sans-serif; 
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Privacy/Blur State */
  body.privacy-active .private-data,
  body.privacy-active .stats-summary {
    filter: blur(8px);
    pointer-events: none;
    user-select: none;
  }

  /* Layout */
  header {
    background: var(--navy-light);
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--glass);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-weight: 700; font-size: 1.25rem; color: var(--accent); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--white); font-weight: 400; font-size: 0.9rem; opacity: 0.7; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1.5rem;
    padding: 2rem;
    background: var(--navy);
  }

  .stat-card {
    background: var(--navy-light);
    padding: 1.5rem;
    border-radius: 12px;
    border: 1px solid var(--glass);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: var(--accent);
    opacity: 0.5;
  }

  .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); display: block; margin-bottom: 0.25rem; }
  .stat-label { font-size: 0.75rem; color: var(--slate); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

  .container { padding: 0 2rem 5rem 2rem; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
    background: var(--navy-light);
    padding: 1.25rem;
    border-radius: 12px;
    border: 1px solid var(--glass);
  }

  .search-box { position: relative; flex: 1; max-width: 400px; }
  .search-box input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--glass);
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border-radius: 8px;
    color: var(--white);
    font-size: 0.9rem;
  }

  .actions { display: flex; gap: 0.75rem; }

  button, .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.6rem 1.25rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  button:hover { background: rgba(100, 255, 218, 0.1); transform: translateY(-1px); }
  button.primary { background: var(--accent); color: var(--navy); }
  button.primary:hover { background: #52e0c4; }

  /* Table Styles */
  .table-container {
    background: var(--navy-light);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--glass);
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 1.25rem 1rem;
    background: rgba(255,255,255,0.03);
    color: var(--accent);
    font-size: 0.75rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--glass);
  }
  td { padding: 1rem; border-bottom: 1px solid var(--glass); font-size: 0.9rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(255,255,255,0.02); }

  .row-image {
    width: 60px; height: 40px;
    background: var(--navy);
    border-radius: 4px;
    object-fit: cover;
    border: 1px solid var(--glass);
  }

  .badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge-safe { background: rgba(100, 255, 218, 0.1); color: var(--accent); }
  .badge-range { background: rgba(255, 77, 77, 0.1); color: var(--red); }

  /* Modals */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 25, 47, 0.85);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal.open { display: flex; }
  .modal-content {
    background: var(--navy-light);
    width: 100%;
    max-width: 700px;
    padding: 2.5rem;
    border-radius: 16px;
    border: 1px solid var(--glass);
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
  .field { display: flex; flex-direction: column; gap: 0.5rem; }
  .field.full { grid-column: span 2; }
  label { font-size: 0.75rem; color: var(--slate); font-weight: 600; text-transform: uppercase; }
  input, select, textarea {
    background: var(--navy);
    border: 1px solid var(--glass);
    color: var(--white);
    padding: 0.8rem 1rem;
    border-radius: 8px;
    font-size: 0.95rem;
    width: 100%;
  }
  input:focus { border-color: var(--accent); outline: none; }

  /* Bulk Progress Overlay */
  #bulkProgressOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 25, 47, 0.95);
    z-index: 2000; display: none; align-items: center; justify-content: center;
  }
  #bulkProgressOverlay.open { display: flex; }
  .progress-box { background: var(--navy-light); width: 100%; max-width: 500px; padding: 2rem; border-radius: 12px; border: 1px solid var(--accent); text-align: center; }
  .progress-bar-bg { background: var(--glass); height: 8px; border-radius: 4px; margin: 1.5rem 0; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.4s; }
  #bulkResultLog { 
    height: 250px; overflow-y: auto; background: var(--navy); 
    padding: 1rem; font-family: 'JetBrains Mono', monospace; 
    font-size: 0.75rem; border-radius: 8px; text-align: left;
    border: 1px solid var(--glass);
  }

  /* Mobile */
  .mobile-cards { display: none; }
  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: 1fr 1fr; padding: 1rem; gap: 1rem; }
    .table-container { display: none; }
    .mobile-cards { display: grid; gap: 1rem; }
    .mobile-card { 
      background: var(--navy-light); padding: 1.25rem; 
      border-radius: 12px; border: 1px solid var(--glass);
    }
    .modal-content { padding: 1.5rem; }
    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">THE ARMORY <span>v2.1</span></div>
  <div class="actions">
    <button onclick="togglePrivacy()" id="privacyBtn">👁️ Privacy: OFF</button>
    <button onclick="showKeySetup(true)" id="keyBtn" title="Set Gemini API Key">⚙️ API KEY</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <span class="stat-value" id="statCount">0</span>
    <span class="stat-label">Total Inventory</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="statSights">0</span>
    <span class="stat-label">Equipped Optics</span>
  </div>
  <div class="stat-card stats-summary">
    <span class="stat-value" id="statValue">$0.00</span>
    <span class="stat-label">Market Valuation</span>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name, UPC, or caliber..." oninput="handleSearch()">
    </div>
    <div class="actions">
      <button class="primary" onclick="openAddModal()">+ New Entry</button>
      <button onclick="startBulkLookup()">⚡ Bulk AI Lookup</button>
      <button onclick="exportCSV()">💾 Export</button>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name / Description</th>
          <th>Manufacturer</th>
          <th>Caliber</th>
          <th>Serial</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="inventoryBody">
        </tbody>
    </table>
  </div>
  
  <div class="mobile-cards" id="mobileGrid">
    </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle" style="margin-bottom: 2rem; color: var(--accent);">New Firearm Entry</h2>
    <div class="form-grid">
      <div class="field full">
        <label>Display Name</label>
        <input type="text" id="m_name" placeholder="e.g. Sig Sauer P320 Spectre">
      </div>
      <div class="field">
        <label>Manufacturer</label>
        <input type="text" id="m_mfr" placeholder="e.g. Heckler & Koch">
      </div>
      <div class="field">
        <label>Caliber</label>
        <input type="text" id="m_cal" placeholder="e.g. 9mm">
      </div>
      <div class="field">
        <label>UPC</label>
        <input type="text" id="m_upc" placeholder="Universal Product Code">
      </div>
      <div class="field">
        <label>MPN / SKU</label>
        <input type="text" id="m_mpn" placeholder="Manufacturer Part Number">
      </div>
      <div class="field">
        <label>Serial Number</label>
        <input type="text" id="m_serial" placeholder="Unique Serial">
      </div>
      <div class="field">
        <label>Purchase Price</label>
        <input type="number" id="m_price" placeholder="0.00">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="m_status">
          <option value="In Safe">In Safe</option>
          <option value="At Range">At Range</option>
          <option value="Clean / Bench">Clean / Bench</option>
          <option value="Secondary Loc">Secondary Loc</option>
        </select>
      </div>
      <div class="field">
        <label>Optic / Sight</label>
        <input type="text" id="m_optic" placeholder="e.g. Trijicon SRO">
      </div>
      <div class="field full">
        <label>Detailed Description</label>
        <textarea id="m_desc" rows="3" placeholder="Additional notes, modifications..."></textarea>
      </div>
    </div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveItem()">Save Entry</button>
    </div>
  </div>
</div>

<div id="bulkProgressOverlay">
  <div class="progress-box">
    <h2 style="color: var(--accent)">AI Processing</h2>
    <p id="bulkStatus" style="font-size: 0.9rem; margin-top: 0.5rem; color: var(--slate)">Analyzing database records...</p>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="bulkBar"></div>
    </div>
    <div id="bulkResultLog"></div>
    <button style="margin-top: 1.5rem;" onclick="location.reload()">Finish & Sync</button>
  </div>
</div>

<script>
// ─── Core Data & Logic ─────────────────────────────────────────
let data = [];
let filtered = [];
let editingId = null;
let privacyMode = false;
const STORAGE_KEY = 'armory_local_cache';

// Initialize data from Firebase
async function initData() {
  if(!window.db) return;
  try {
    const snap = await window.db.collection("armory").doc("inventory").get();
    if(snap.exists) {
      data = snap.data().data || [];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } else {
      const local = localStorage.getItem(STORAGE_KEY);
      if(local) data = JSON.parse(local);
    }
  } catch(e) {
    console.warn("Cloud load failed, using local", e);
    const local = localStorage.getItem(STORAGE_KEY);
    if(local) data = JSON.parse(local);
  }
}

// Save to Cloud & Local
async function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if(window.db) {
    await window.db.collection("armory").doc("inventory").set({
      data: data,
      lastUpdated: new Date().toISOString()
    });
  }
  renderTable();
}

// ─── AI Integration (UPDATED FOR v1beta STABILITY) ────────────────
async function askGemini(prompt) {
  const apiKey = localStorage.getItem("armory_gemini_key") || "";
  if(!apiKey) throw new Error("API Key Missing");

  // Exact model names for v1beta billing-enabled keys
  const models = ["gemini-1.5-flash", "gemini-1.5-flash-8b", "gemini-1.5-pro"];
  
  for(const m of models) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          safetySettings: [
            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }
          ]
        })
      });

      const json = await res.json();
      if(!res.ok) {
        if(res.status === 404) continue; // Try next model
        throw new Error(json.error?.message || "API Failure");
      }

      let text = json.candidates?.[0]?.content?.parts?.[0]?.text || "";
      return text.replace(/```json/g, "").replace(/```/g, "").trim();
    } catch(e) {
      console.warn(`Model ${m} failed:`, e.message);
    }
  }
  throw new Error("All AI models failed to respond.");
}

// Bulk Lookup Loop with mandatory 4.2s delay
async function startBulkLookup() {
  const targets = data.filter(d => (d.upc || d.mpn) && !d.manufacturer);
  if(!targets.length) { alert("All items have manufacturer data or are missing UPC/MPN."); return; }

  if(!confirm(`AI will attempt to find details for ${targets.length} items. This takes ~4 seconds per item. Continue?`)) return;

  const overlay = document.getElementById('bulkProgressOverlay');
  const bar = document.getElementById('bulkBar');
  const log = document.getElementById('bulkResultLog');
  const status = document.getElementById('bulkStatus');
  
  overlay.classList.add('open');
  log.innerHTML = "";
  
  let n = 0;
  for(const e of targets) {
    status.innerText = `Analyzing Item ${n+1} of ${targets.length}...`;
    try {
      const prompt = `Return ONLY a valid JSON object for this firearm (UPC: ${e.upc}, MPN: ${e.mpn}). If unknown, leave field empty: {"official_name":"","manufacturer":"","caliber":"","gunType":"","description":""}`;
      const resText = await askGemini(prompt);
      const parsed = JSON.parse(resText);
      
      const idx = data.findIndex(d => d.id === e.id);
      if(idx !== -1) {
        data[idx] = {...data[idx], ...parsed};
        log.innerHTML += `<div style="color:var(--green)">✓ ${e.name.substring(0,30)} updated</div>`;
        await saveAll();
      }
    } catch(err) {
      log.innerHTML += `<div style="color:var(--red)">✗ ${e.name.substring(0,30)} - ${err.message}</div>`;
    }
    n++;
    bar.style.width = `${(n/targets.length)*100}%`;
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 4200)); 
  }
  status.innerText = "Processing Complete.";
}

// ─── UI Rendering & Other Functions ──────────────────────────────
function renderTable() {
  const body = document.getElementById('inventoryBody');
  const grid = document.getElementById('mobileGrid');
  if(!body || !grid) return;
  body.innerHTML = ""; grid.innerHTML = "";

  filtered.forEach(item => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><img src="https://via.placeholder.com/60x40/112240/64ffda?text=IMG" class="row-image"></td>
      <td>
        <div style="font-weight: 600;">${item.name}</div>
        <div style="font-size: 0.75rem; color: var(--slate);">${item.upc || item.mpn || 'No Code'}</div>
      </td>
      <td>${item.manufacturer || '-'}</td>
      <td>${item.caliber || '-'}</td>
      <td class="private-data">${privacyMode ? '•••••' : (item.serial || '—')}</td>
      <td><span class="badge ${item.status === 'In Safe' ? 'badge-safe' : 'badge-range'}">${item.status}</span></td>
      <td><button onclick="openEditModal('${item.id}')">Edit</button></td>
    `;
    body.appendChild(row);
  });
  updateStats();
}

function updateStats() {
  const countEl = document.getElementById('statCount');
  const valueEl = document.getElementById('statValue');
  if(countEl) countEl.textContent = data.length;
  if(valueEl) {
    const val = data.reduce((s, i) => s + (parseFloat(i.price) || 0), 0);
    valueEl.textContent = `$${val.toLocaleString(undefined, {minimumFractionDigits:2})}`;
  }
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = data.filter(i => 
    i.name.toLowerCase().includes(q) || 
    (i.upc && i.upc.includes(q)) || 
    (i.caliber && i.caliber.toLowerCase().includes(q))
  );
  renderTable();
}

function togglePrivacy() {
  privacyMode = !privacyMode;
  document.body.classList.toggle('privacy-active', privacyMode);
  const btn = document.getElementById('privacyBtn');
  if(btn) btn.textContent = privacyMode ? "🙈 Privacy: ON" : "👁️ Privacy: OFF";
  renderTable();
}

function showKeySetup(promptUser) {
  const current = localStorage.getItem("armory_gemini_key") || "";
  if(promptUser) {
    const val = prompt("Enter Gemini API Key (Billing-enabled):", current);
    if(val !== null) {
      localStorage.setItem("armory_gemini_key", val.trim());
      location.reload();
    }
  }
}

// Modal Management
function openEditModal(id) {
  editingId = id;
  const item = data.find(d => d.id === id);
  if(!item) return;
  document.getElementById('m_name').value = item.name || "";
  document.getElementById('m_mfr').value = item.manufacturer || "";
  document.getElementById('m_cal').value = item.caliber || "";
  document.getElementById('m_upc').value = item.upc || "";
  document.getElementById('m_mpn').value = item.mpn || "";
  document.getElementById('m_serial').value = item.serial || "";
  document.getElementById('m_price').value = item.price || "";
  document.getElementById('m_status').value = item.status || "In Safe";
  document.getElementById('m_optic').value = item.optic || "";
  document.getElementById('m_desc').value = item.desc || "";
  document.getElementById('editModal').classList.add('open');
}

function openAddModal() { editingId = null; document.getElementById('editModal').classList.add('open'); }
function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveItem() {
  const item = {
    id: editingId || Date.now().toString(),
    name: document.getElementById('m_name').value,
    manufacturer: document.getElementById('m_mfr').value,
    caliber: document.getElementById('m_cal').value,
    upc: document.getElementById('m_upc').value,
    mpn: document.getElementById('m_mpn').value,
    serial: document.getElementById('m_serial').value,
    price: document.getElementById('m_price').value,
    status: document.getElementById('m_status').value,
    optic: document.getElementById('m_optic').value,
    desc: document.getElementById('m_desc').value,
  };
  if(editingId) {
    const idx = data.findIndex(d => d.id === editingId);
    data[idx] = item;
  } else {
    data.push(item);
  }
  await saveAll();
  closeModal();
}

async function startApp() {
  await initData();
  filtered = [...data];
  renderTable();
}

document.addEventListener('firebase-ready', startApp);
</script>
</body>
</html>
