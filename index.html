<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armory — Navy & White</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script>
  function initFirebase() {
    const firebaseConfig = {
      apiKey: "AIzaSyDw95urlhjKkXqBcj4LNgkHpmWydFsHLR0",
      authDomain: "firearm-inventory-5d0be.firebaseapp.com",
      projectId: "firearm-inventory-5d0be",
      storageBucket: "firearm-inventory-5d0be.firebasestorage.app",
      messagingSenderId: "1060866359048",
      appId: "1:1060866359048:web:6373c8ba96e8236b9176bd"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    window.db = firebase.firestore();
    window._fbReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  }
  initFirebase();
</script>

<style>
  :root {
    --navy: #0a192f; --navy-light: #112240; --navy-lighter: #233554;
    --accent: #64ffda; --slate: #8892b0; --white: #e6f1ff;
    --glass: rgba(255, 255, 255, 0.05); --red: #ff4d4d; --green: #64ffda;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; line-height: 1.6; }
  body.privacy-active .private-data, body.privacy-active .stats-summary { filter: blur(8px); pointer-events: none; }
  header { background: var(--navy-light); padding: 1rem 2rem; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 700; font-size: 1.25rem; color: var(--accent); }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; padding: 2rem; }
  .stat-card { background: var(--navy-light); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass); position: relative; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); opacity: 0.5; }
  .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); display: block; }
  .stat-label { font-size: 0.75rem; color: var(--slate); text-transform: uppercase; font-weight: 600; }
  .container { padding: 0 2rem 5rem 2rem; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--navy-light); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--glass); gap: 1rem; flex-wrap: wrap; }
  .search-box { flex: 1; max-width: 400px; }
  .search-box input { width: 100%; background: var(--navy); border: 1px solid var(--glass); padding: 0.75rem; border-radius: 8px; color: var(--white); }
  button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.6rem 1.25rem; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.85rem; }
  button.primary { background: var(--accent); color: var(--navy); }
  .table-container { background: var(--navy-light); border-radius: 12px; overflow: hidden; border: 1px solid var(--glass); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 1.25rem 1rem; background: rgba(255,255,255,0.03); color: var(--accent); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--glass); }
  td { padding: 1rem; border-bottom: 1px solid var(--glass); font-size: 0.9rem; }
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
  .badge-safe { background: rgba(100, 255, 218, 0.1); color: var(--accent); }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 47, 0.85); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-content { background: var(--navy-light); width: 100%; max-width: 700px; padding: 2.5rem; border-radius: 16px; border: 1px solid var(--glass); max-height: 90vh; overflow-y: auto; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
  .field.full { grid-column: span 2; }
  label { font-size: 0.75rem; color: var(--slate); text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 0.5rem; }
  input, select, textarea { background: var(--navy); border: 1px solid var(--glass); color: var(--white); padding: 0.8rem; border-radius: 8px; width: 100%; }
  #bulkProgressOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 47, 0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
  #bulkProgressOverlay.open { display: flex; }
  .progress-box { background: var(--navy-light); width: 100%; max-width: 500px; padding: 2rem; border-radius: 12px; border: 1px solid var(--accent); text-align: center; }
  .progress-bar-bg { background: var(--glass); height: 8px; border-radius: 4px; margin: 1.5rem 0; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.4s; }
  #bulkResultLog { height: 200px; overflow-y: auto; background: var(--navy); padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; border-radius: 8px; text-align: left; }
</style>
</head>
<body>

<header>
  <div class="logo">THE ARMORY <span>v2.1</span></div>
  <div style="display:flex; gap:0.5rem;">
    <button onclick="togglePrivacy()" id="privacyBtn">👁️ Privacy: OFF</button>
    <button onclick="showKeySetup(true)">⚙️ API KEY</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card"><span class="stat-value" id="statCount">0</span><span class="stat-label">Total Inventory</span></div>
  <div class="stat-card stats-summary"><span class="stat-value" id="statValue">$0.00</span><span class="stat-label">Market Valuation</span></div>
</div>

<div class="container">
  <div class="toolbar">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search..." oninput="handleSearch()"></div>
    <div style="display:flex; gap:0.5rem;">
      <button class="primary" onclick="openAddModal()">+ New Entry</button>
      <button onclick="startBulkLookup()">⚡ Bulk AI Lookup</button>
      <button onclick="exportCSV()">💾 Export</button>
    </div>
  </div>
  <div class="table-container">
    <table>
      <thead><tr><th>Name</th><th>Manufacturer</th><th>Caliber</th><th>Serial</th><th>Status</th><th>Action</th></tr></thead>
      <tbody id="inventoryBody"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 style="margin-bottom: 2rem; color: var(--accent);">Firearm Details</h2>
    <div class="form-grid">
      <div class="field full"><label>Display Name</label><input type="text" id="m_name"></div>
      <div class="field"><label>Manufacturer</label><input type="text" id="m_mfr"></div>
      <div class="field"><label>Caliber</label><input type="text" id="m_cal"></div>
      <div class="field"><label>UPC</label><input type="text" id="m_upc"></div>
      <div class="field"><label>MPN</label><input type="text" id="m_mpn"></div>
      <div class="field"><label>Serial</label><input type="text" id="m_serial"></div>
      <div class="field"><label>Price</label><input type="number" id="m_price"></div>
      <div class="field">
        <label>Status</label>
        <select id="m_status"><option value="In Safe">In Safe</option><option value="At Range">At Range</option></select>
      </div>
      <div class="field full"><label>Optic</label><input type="text" id="m_optic"></div>
      <div class="field full"><label>Description</label><textarea id="m_desc" rows="3"></textarea></div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:1rem;">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div id="bulkProgressOverlay">
  <div class="progress-box">
    <h2 style="color: var(--accent)">AI Processing</h2>
    <p id="bulkStatus" style="color: var(--slate); font-size: 0.8rem;">Analyzing...</p>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="bulkBar"></div></div>
    <div id="bulkResultLog"></div>
    <button style="margin-top:1.5rem;" onclick="location.reload()">Finish</button>
  </div>
</div>

<script>
let data = []; let filtered = []; let editingId = null; let privacyMode = false;
const STORAGE_KEY = 'armory_local_cache';

async function initData() {
  if(!window.db) return;
  const snap = await window.db.collection("armory").doc("inventory").get();
  data = snap.exists ? (snap.data().data || []) : [];
  filtered = [...data];
  renderTable();
}

async function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if(window.db) await window.db.collection("armory").doc("inventory").set({ data, lastUpdated: new Date().toISOString() });
  renderTable();
}

async function askGemini(prompt) {
  const apiKey = localStorage.getItem("armory_gemini_key");
  const models = ["gemini-1.5-flash", "gemini-1.5-pro"];
  for(const m of models) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const json = await res.json();
      if(!res.ok) continue;
      return json.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
    } catch(e) { console.warn(m + " failed"); }
  }
  throw new Error("AI failed");
}

async function startBulkLookup() {
  const targets = data.filter(d => (d.upc || d.mpn) && !d.manufacturer);
  if(!targets.length) return alert("No items need lookup.");
  document.getElementById('bulkProgressOverlay').classList.add('open');
  const log = document.getElementById('bulkResultLog');
  const bar = document.getElementById('bulkBar');
  let n = 0;
  for(const e of targets) {
    try {
      const res = await askGemini(`Return ONLY JSON for UPC ${e.upc}: {"manufacturer":"","caliber":""}`);
      const parsed = JSON.parse(res);
      const idx = data.findIndex(d => d.id === e.id);
      data[idx] = {...data[idx], ...parsed};
      log.innerHTML += `<div style="color:var(--green)">✓ ${e.name} updated</div>`;
      await saveAll();
    } catch(err) { log.innerHTML += `<div style="color:var(--red)">✗ ${e.name} failed</div>`; }
    n++; bar.style.width = `${(n/targets.length)*100}%`;
    await new Promise(r => setTimeout(r, 4200));
  }
}

function renderTable() {
  const body = document.getElementById('inventoryBody');
  body.innerHTML = filtered.map(i => `
    <tr>
      <td>${i.name}</td>
      <td>${i.manufacturer || '-'}</td>
      <td>${i.caliber || '-'}</td>
      <td class="private-data">${privacyMode ? '••••' : (i.serial || '-')}</td>
      <td><span class="badge badge-safe">${i.status}</span></td>
      <td><button onclick="openEditModal('${i.id}')">Edit</button></td>
    </tr>`).join('');
  updateStats();
}

function updateStats() {
  document.getElementById('statCount').textContent = data.length;
  const total = data.reduce((s, i) => s + (parseFloat(i.price) || 0), 0);
  document.getElementById('statValue').textContent = `$${total.toLocaleString(undefined, {minimumFractionDigits:2})}`;
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = data.filter(i => i.name.toLowerCase().includes(q) || (i.upc && i.upc.includes(q)));
  renderTable();
}

function togglePrivacy() {
  privacyMode = !privacyMode;
  document.body.classList.toggle('privacy-active', privacyMode);
  document.getElementById('privacyBtn').textContent = privacyMode ? "🙈 Privacy: ON" : "👁️ Privacy: OFF";
  renderTable();
}

function showKeySetup(promptUser) {
  const val = prompt("Enter Gemini API Key:", localStorage.getItem("armory_gemini_key") || "");
  if(val) { localStorage.setItem("armory_gemini_key", val); location.reload(); }
}

function openAddModal() { editingId = null; document.getElementById('editModal').classList.add('open'); }
function openEditModal(id) {
  editingId = id; const i = data.find(d => d.id === id);
  ['name','mfr','cal','upc','mpn','serial','price','optic','desc'].forEach(f => {
    const el = document.getElementById('m_'+f);
    if(el) el.value = i[f] || "";
  });
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveItem() {
  const item = {
    id: editingId || Date.now().toString(),
    name: document.getElementById('m_name').value,
    manufacturer: document.getElementById('m_mfr').value,
    caliber: document.getElementById('m_cal').value,
    upc: document.getElementById('m_upc').value,
    mpn: document.getElementById('m_mpn').value,
    serial: document.getElementById('m_serial').value,
    price: document.getElementById('m_price').value,
    status: document.getElementById('m_status').value,
    optic: document.getElementById('m_optic').value,
    desc: document.getElementById('m_desc').value
  };
  if(editingId) data[data.findIndex(d => d.id === editingId)] = item;
  else data.push(item);
  await saveAll(); closeModal();
}

function exportCSV() {
  const headers = "Name,Manufacturer,Caliber,Serial,Price,Status\n";
  const rows = data.map(i => `"${i.name}","${i.manufacturer}","${i.caliber}","${i.serial}",${i.price},"${i.status}"`).join("\n");
  const blob = new Blob([headers + rows], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'inventory.csv'; a.click();
}

document.addEventListener('firebase-ready', initData);
</script>
</body>
</html>
