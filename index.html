<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armory — Elite Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<style>
  :root {
    --navy: #0a192f;
    --navy-light: #112240;
    --accent: #64ffda;
    --slate: #8892b0;
    --white: #e6f1ff;
    --red: #ff4d4d;
    --green: #64ffda;
    --glass: rgba(255, 255, 255, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background-color: var(--navy); 
    color: var(--white); 
    font-family: 'Inter', sans-serif; 
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Privacy Blur Effect */
  body.privacy-active .private-data,
  body.privacy-active .stats-summary {
    filter: blur(8px);
    pointer-events: none;
    user-select: none;
  }

  header {
    background: var(--navy-light);
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--glass);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-weight: 700; font-size: 1.5rem; color: var(--accent); letter-spacing: -1px; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    padding: 2rem;
    background: var(--navy);
  }

  .stat-card {
    background: var(--navy-light);
    padding: 1.5rem;
    border-radius: 8px;
    border: 1px solid var(--glass);
    text-align: center;
  }

  .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); display: block; }
  .stat-label { font-size: 0.8rem; color: var(--slate); text-transform: uppercase; }

  .container { padding: 0 2rem 5rem 2rem; }

  .toolbar {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    background: var(--navy-light);
    padding: 1rem;
    border-radius: 8px;
  }

  button, .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 0.9rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  button:hover { background: rgba(100, 255, 218, 0.1); }
  button.primary { background: var(--accent); color: var(--navy); }
  button.active { background: var(--accent); color: var(--navy); }

  table { width: 100%; border-collapse: collapse; background: var(--navy-light); border-radius: 8px; overflow: hidden; }
  th { text-align: left; padding: 1rem; background: rgba(255,255,255,0.05); color: var(--accent); font-size: 0.8rem; text-transform: uppercase; }
  td { padding: 1rem; border-bottom: 1px solid var(--glass); font-size: 0.9rem; }
  tr:hover { background: rgba(255,255,255,0.02); }

  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 25, 47, 0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.open { display: flex; }
  .modal-content {
    background: var(--navy-light);
    width: 90%;
    max-width: 600px;
    padding: 2.5rem;
    border-radius: 12px;
    border: 1px solid var(--accent);
    max-height: 90vh;
    overflow-y: auto;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1rem;
    background: var(--navy);
    border: 1px solid var(--glass);
    color: var(--white);
    border-radius: 4px;
  }

  /* Progress Overlay */
  #bulkProgressOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 25, 47, 0.95);
    z-index: 2000; display: none; align-items: center; justify-content: center;
  }
  #bulkProgressOverlay.open { display: flex; }
  .progress-box { background: var(--navy-light); width: 500px; padding: 2rem; border-radius: 8px; border: 1px solid var(--accent); }
  .progress-bar-bg { background: var(--glass); height: 10px; border-radius: 5px; margin: 1rem 0; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s; }
  #bulkResultLog { height: 200px; overflow-y: auto; background: var(--navy); padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; margin-top: 1rem; }

  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: 1fr 1fr; padding: 1rem; }
    table { display: none; }
    .mobile-cards { display: block; }
  }
</style>

<script>
  // --- FIREBASE CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyDw95urlhjKkXqBcj4LNgkHpmWydFsHLR0",
    authDomain: "firearm-inventory-5d0be.firebaseapp.com",
    projectId: "firearm-inventory-5d0be",
    storageBucket: "firearm-inventory-5d0be.firebasestorage.app",
    messagingSenderId: "1060866359048",
    appId: "1:1060866359048:web:6373c8ba96e8236b9176bd"
  };

  function initFirebase() {
    try {
      firebase.initializeApp(firebaseConfig);
      window.db = firebase.firestore();
      window.storage = firebase.storage();
      window._fbReady = true;
      document.dispatchEvent(new Event('firebase-ready'));
    } catch(e) { console.error("Firebase Init Error:", e); }
  }
  initFirebase();

  // --- CORE DATA ---
  let data = [];
  let filtered = [];
  let privacyMode = false;
  const STORAGE_KEY = 'armory_local_cache';

  // --- GEMINI LOGIC (DEEPSEEK OPTIMIZED) ---
  async function callGemini(prompt) {
    const apiKey = localStorage.getItem("armory_gemini_key");
    if(!apiKey) { showKeySetup(true); throw new Error("API Key required"); }
    
    // Updated stable model list
    const models = ["gemini-1.5-flash", "gemini-1.5-flash-8b", "gemini-1.5-pro"];
    
    for(const m of models) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            contents: [{parts: [{text: prompt}]}],
            safetySettings: [
              {category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE"},
              {category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE"},
              {category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE"},
              {category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE"}
            ]
          })
        });
        
        const json = await res.json();
        if(!res.ok) {
          if(res.status === 404) continue; // Try next model
          throw new Error(json.error?.message || "API Error");
        }
        
        const txt = json.candidates?.[0]?.content?.parts?.[0]?.text || "";
        return txt.replace(/```json/g, "").replace(/```/g, "").trim();
      } catch(e) { console.warn(`Model ${m} failed:`, e.message); }
    }
    throw new Error("All models failed. Check billing status.");
  }

  // --- UI FUNCTIONS ---
  function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = "position:fixed;bottom:20px;right:20px;background:var(--accent);color:var(--navy);padding:12px 24px;border-radius:4px;z-index:9999;font-weight:600;";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function togglePrivacy() {
    privacyMode = !privacyMode;
    document.body.classList.toggle('privacy-active', privacyMode);
    document.getElementById('privacyBtn').textContent = privacyMode ? "🙈 Privacy: ON" : "👁️ Privacy: OFF";
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('inventoryBody');
    tbody.innerHTML = filtered.map(item => `
      <tr>
        <td>${item.name || 'Unnamed'}</td>
        <td>${item.manufacturer || '-'}</td>
        <td>${item.caliber || '-'}</td>
        <td class="private-data">${privacyMode ? '****' : (item.serial || '-')}</td>
        <td>${item.status || 'In Safe'}</td>
        <td><button onclick="editItem('${item.id}')">Edit</button></td>
      </tr>
    `).join('');
    updateStats();
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = data.length;
    const totalVal = data.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
    document.getElementById('totalValue').textContent = `$${totalVal.toLocaleString()}`;
  }

  // --- INITIALIZATION ---
  async function startApp() {
    const snap = await window.db.collection("armory").doc("inventory").get();
    if(snap.exists) {
      data = snap.data().data || [];
      filtered = [...data];
      renderTable();
    }
    if(!localStorage.getItem("armory_gemini_key")) showKeySetup(true);
  }

  document.addEventListener('firebase-ready', startApp);

  function showKeySetup(show) {
    const key = prompt("Enter Gemini API Key:", localStorage.getItem("armory_gemini_key") || "");
    if(key) {
      localStorage.setItem("armory_gemini_key", key);
      showToast("Key Saved");
    }
  }

  // --- BULK LOOKUP LOGIC ---
  async function startBulkLookup() {
    const targets = data.filter(d => (d.upc || d.mpn) && !d.manufacturer);
    if(!targets.length) return showToast("No items need lookup");
    
    document.getElementById('bulkProgressOverlay').classList.add('open');
    const log = document.getElementById('bulkResultLog');
    
    for(let i=0; i < targets.length; i++) {
      const item = targets[i];
      try {
        const prompt = `Return JSON for firearm UPC/MPN "${item.upc || item.mpn}": {"manufacturer":"","caliber":"","gunType":""}`;
        const result = await callGemini(prompt);
        const parsed = JSON.parse(result);
        
        const idx = data.findIndex(d => d.id === item.id);
        data[idx] = {...data[idx], ...parsed};
        log.innerHTML += `<div>✅ ${item.name} updated</div>`;
      } catch(e) { log.innerHTML += `<div style="color:var(--red)">❌ ${item.name} failed</div>`; }
      
      await new Promise(r => setTimeout(r, 4200)); // Rate limit pause
    }
    showToast("Bulk Lookup Complete");
  }
</script>
</head>
<body>

<header>
  <div class="logo">ARMORY v2</div>
  <div class="nav-actions">
    <button id="privacyBtn" onclick="togglePrivacy()">👁️ Privacy: OFF</button>
    <button onclick="showKeySetup(true)">⚙️ Settings</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <span class="stat-value" id="totalCount">0</span>
    <span class="stat-label">Firearms</span>
  </div>
  <div class="stat-card stats-summary">
    <span class="stat-value" id="totalValue">$0</span>
    <span class="stat-label">Total Investment</span>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <button class="primary" onclick="alert('Add Functionality here')">+ Add New</button>
    <button onclick="startBulkLookup()">⚡ Bulk AI Lookup</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Manufacturer</th>
        <th>Caliber</th>
        <th>Serial</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="inventoryBody">
      </tbody>
  </table>
</div>

<div id="bulkProgressOverlay">
  <div class="progress-box">
    <h3>AI Bulk Processing</h3>
    <div id="bulkResultLog"></div>
    <br>
    <button onclick="location.reload()">Close & Refresh</button>
  </div>
</div>

</body>
</html>
