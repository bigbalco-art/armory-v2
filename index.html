<script>
// ─── Gemini API Integration (Fixed) ───────────────────────────────
let _aiSearching=false;

async function callGemini(prompt){
  const apiKey=localStorage.getItem("armory_gemini_key")||"";
  if(!apiKey){showKeySetup(true);throw new Error("No Gemini API key set — use the ⚙️ button.");}
  const models=["gemini-1.5-flash","gemini-1.5-flash-8b","gemini-1.5-pro"];
  const sys="You are a firearm product database assistant. Return ONLY valid JSON — no markdown or text.";
  const full=`${sys}\n\n${prompt}`;
  for(const m of models){
    try{
      const res=await fetch(`[generativelanguage.googleapis.com](https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey})`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{parts:[{text:full}]}],
          generationConfig:{temperature:0.1,maxOutputTokens:600},
          safetySettings:[
            {category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_NONE"},
            {category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_NONE"},
            {category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_NONE"},
            {category:"HARM_CATEGORY_SEXUALLY_EXPLICIT",threshold:"BLOCK_NONE"}
          ]
        })
      });
      const j=await res.json();
      if(!res.ok){
        const msg=j?.error?.message||res.status;
        if(res.status===404)continue;
        if(res.status===429){await new Promise(r=>setTimeout(r,35000));continue;}
        throw new Error(msg);
      }
      const txt=(j.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
      if(!txt)throw new Error("Empty Gemini response");
      const clean=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      const a=clean.indexOf("{"),b=clean.lastIndexOf("}");
      if(a===-1||b===-1)throw new Error("Invalid JSON response");
      const js=clean.slice(a,b+1);
      JSON.parse(js);
      console.log("✅ Gemini success:",m);
      return js;
    }catch(e){console.warn("Gemini error",m,e.message);}
  }
  throw new Error("All Gemini models failed — check API key or billing status.");
}

// ─── Bulk Lookup Fixed ─────────────────────────────────────────────
let bulkCancelled=false;
function cancelBulkLookup(){bulkCancelled=true;document.getElementById('bulkProgressOverlay').classList.remove('open');}

async function startBulkLookup(){
  const targets=data.filter(d=>(d.upc||d.mpn)&&(!d.manufacturer||!d.gunType||!d.caliber));
  if(!targets.length){showToast('No entries need lookup.');return;}
  bulkCancelled=false;
  const over=document.getElementById('bulkProgressOverlay');
  const status=document.getElementById('bulkStatusText');
  const bar=document.getElementById('bulkProgressBar');
  const log=document.getElementById('bulkResultLog');
  const cancel=document.getElementById('bulkCancelBtn');
  const done=document.getElementById('bulkDoneBtn');
  over.classList.add('open');log.innerHTML='';cancel.style.display='';done.style.display='none';
  let n=0,filled=0;
  for(const e of targets){
    if(bulkCancelled)break;
    status.textContent=`Looking up ${n+1} of ${targets.length}: ${e.name.substring(0,40)}...`;
    bar.style.width=Math.round((n/targets.length)*100)+'%';
    try{
      const key=e.upc||e.mpn||"",kType=e.upc?"UPC":"MPN";
      const prompt=`Firearm ${kType}: "${key}", Name: "${e.name}". Return ONLY JSON:
{"manufacturer":"","gunType":"Handgun|Revolver|Rifle|Shotgun|Bolt Action|Lever Action|Bullpup|PCC|AR Pistol|Suppressor|Optic|Accessory|Other","caliber":"","mpn":"","upc":"","official_name":"","description":""}`;
      const text=await callGemini(prompt);
      let parsed={};try{parsed=JSON.parse(text);}catch{}
      const idx=data.findIndex(d=>d.id===e.id);
      if(idx>=0){
        const d=data[idx];const u=[];
        if(parsed.manufacturer&&!d.manufacturer){d.manufacturer=parsed.manufacturer;u.push("Mfr");}
        if(parsed.gunType&&!d.gunType){d.gunType=parsed.gunType;u.push("Type");}
        if(parsed.caliber&&!d.caliber){d.caliber=parsed.caliber;u.push("Cal");}
        if(parsed.mpn&&!d.mpn){d.mpn=parsed.mpn;u.push("MPN");}
        if(parsed.upc&&!d.upc){d.upc=parsed.upc;u.push("UPC");}
        if(parsed.description&&!d.description){d.description=parsed.description;u.push("Desc");}
        if(parsed.official_name&&parsed.official_name.length>3&&parsed.official_name!==d.name){d.name=parsed.official_name;u.push("Name");}
        if(u.length){filled++;log.innerHTML+=`<div style="color:var(--green)">✓ ${e.name.substring(0,35)} — ${u.join(', ')}</div>`;saveAll();}
        else log.innerHTML+=`<div style="color:var(--muted)">— ${e.name.substring(0,35)} (no new data)</div>`;
      }
    }catch(err){log.innerHTML+=`<div style="color:var(--red)">✗ ${e.name.substring(0,35)} — ${err.message}</div>`;}
    log.scrollTop=log.scrollHeight;n++;
    await new Promise(r=>setTimeout(r,4200)); // rate‑limit delay
  }
  bar.style.width='100%';
  status.textContent=bulkCancelled?`Cancelled after ${n} — ${filled} updated`:`Done — ${filled}/${n} updated.`;
  cancel.style.display='none';done.style.display='';
  filterTable();
}
